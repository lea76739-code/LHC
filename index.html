<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CountPlus</title>
    <link rel="stylesheet" href="./styles.css?v=mobile-profit-46">
  </head>
  <body>
    <main class="app">
      <aside class="side">
        <section class="panel">
          <div class="section-head">
            <h2>号码</h2>
            <span id="selectedCount">0 个</span>
          </div>
          <div class="number-actions">
            <button id="selectAll">全选</button>
            <button id="selectNone">全不选</button>
            <button id="invertSelect">反选</button>
            <button id="resetAll" class="icon-btn" title="恢复默认">↺</button>
          </div>
          <div id="numberGrid" class="number-grid" aria-label="1 到 49 号码选择"></div>
          <div class="manual-groups">
            <label class="manual-row">
              <span>主攻：</span>
              <input id="mainAttackNumbers" type="text" inputmode="numeric">
              <output id="mainAttackStatus"></output>
            </label>
            <label class="manual-row">
              <span>次攻：</span>
              <input id="secondAttackNumbers" type="text" inputmode="numeric">
              <output id="secondAttackStatus"></output>
            </label>
            <label class="manual-row">
              <span>防守：</span>
              <input id="defenseNumbers" type="text" inputmode="numeric" readonly>
              <output id="defenseStatus"></output>
            </label>
            <div id="manualProfitPanel" class="manual-profit-panel" aria-live="polite"></div>
          </div>
        </section>
      </aside>

      <section class="work">
        <div class="toolbar">
          <label class="hidden-pick-control">
            <span>最少位数</span>
            <input id="minPickCount" type="number" min="1" max="49">
          </label>
          <label class="hidden-pick-control">
            <span>最多位数</span>
            <input id="pickCount" type="number" min="1" max="49">
          </label>
          <label>
            <span>分组数</span>
            <input id="groupCount" type="number" min="1">
          </label>
          <label>
            <span>预算数</span>
            <input id="budgetAmount" type="number" min="1" required>
          </label>
          <label>
            <span>预算区间</span>
            <input id="budgetRange" type="number" min="0">
          </label>
          <label>
            <span>分割符</span>
            <input id="separators" type="text" value="-/.，*。~" maxlength="12">
          </label>
          <label>
            <span>赔率</span>
            <input id="oddsAmount" type="number" min="1" step="0.01" value="47">
          </label>
        </div>

        <section class="filters">
          <div class="filter-top">
            <div class="filter-band parity-band">
              <label class="check-pill"><input id="oddOnly" type="checkbox"><span>单数</span></label>
              <label class="check-pill"><input id="evenOnly" type="checkbox"><span>双数</span></label>
            </div>

            <div class="filter-band filter-inputs">
              <label>
                <span>头数</span>
                <input id="headDigits" type="text">
              </label>
            </div>

            <div class="filter-band filter-inputs">
              <label>
                <span>尾数</span>
                <input id="tailDigits" type="text">
              </label>
            </div>
          </div>

          <div class="filter-bottom">
            <div class="filter-band zodiac-band">
              <div id="zodiacGrid" class="chip-grid zodiac-grid"></div>
            </div>

            <div class="filter-side-stack">
              <div class="filter-band wave-band">
                <div id="waveGrid" class="chip-grid compact"></div>
              </div>

              <div class="filter-band prefix-band">
                <div id="prefixGrid" class="chip-grid compact"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="result-area">
          <div class="result-head">
            <div>
              <h2>结果</h2>
              <p><span id="candidateText">可用号码 0 个</span><span class="logic-note">先生成分组，再统计每个号码分配</span></p>
            </div>
            <div class="result-actions">
              <button id="randomBtn">随机生成</button>
              <button id="multiBtn" class="primary">多导出</button>
              <button id="profitBtn" hidden>计算利润</button>
              <button id="copyBtn">复制数据</button>
              <button id="clearBtn">清除</button>
            </div>
          </div>
          <div id="allocationPanel" class="allocation-panel" hidden></div>
          <textarea id="resultOutput" spellcheck="false"></textarea>
          <div id="mobileProfitPanel" class="manual-profit-panel mobile-profit-panel" aria-live="polite"></div>
          <div id="dataPanel" class="data-panel" hidden></div>
          <div class="status">
            <span id="totalText">总分配: 0</span>
            <span id="rangeText">区间最大: 0 ｜ 区间最小: 0</span>
            <span id="noticeText"></span>
          </div>
        </section>
      </section>
    </main>

    <div id="randomDialog" class="dialog-backdrop" hidden>
      <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="randomDialogTitle">
        <h3 id="randomDialogTitle">随机生成</h3>
        <label>
          <span>号码数量</span>
          <input id="randomCountInput" type="text" inputmode="numeric">
        </label>
        <div class="dialog-actions">
          <button id="randomCancelBtn">取消</button>
          <button id="randomConfirmBtn" class="primary">确定</button>
        </div>
      </div>
    </div>

    <script src="./app.js?v=budget-guard-95"></script>
  </body>
</html>
